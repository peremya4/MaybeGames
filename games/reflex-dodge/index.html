<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Reflex Dodge — MaybeGames</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="bar">
        <h1>Reflex Dodge</h1>
        <div class="stats">
          <span id="score">Score: 0</span>
          <span id="best" class="muted">Best: 0</span>
        </div>
      </header>
      <div class="canvas-wrap">
        <canvas id="game" width="480" height="640" aria-label="Game canvas"></canvas>
        <div id="overlay" class="overlay hidden">
          <p id="overlay-title" class="overlay-title">Game over</p>
          <p id="overlay-detail" class="overlay-detail"></p>
          <button type="button" id="restart" class="btn">Restart</button>
        </div>
      </div>
      <aside class="help" id="help">
        <strong>How to play:</strong> Move with <kbd>←</kbd> <kbd>→</kbd> or <kbd>A</kbd> <kbd>D</kbd>.
        Avoid red blocks. Collect green orbs for bonus points. Survive longer for a higher score.
        Press <kbd>R</kbd> or click Restart when the round ends.
      </aside>
    </div>
    <script src="main.js" type="module"></script>
  </body>
</html>
