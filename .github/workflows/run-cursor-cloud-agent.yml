name: Run Cursor Cloud Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *"

permissions:
  issues: write
  contents: read

jobs:
  run-cursor-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Find cursor-task issue
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              labels: "cursor-task",
              state: "open",
              per_page: 1,
            });

            if (issues.data.length === 0) {
              core.setOutput("found", "false");
              return;
            }

            const issue = issues.data[0];
            core.setOutput("found", "true");
            core.setOutput("number", String(issue.number));
            core.setOutput("title", issue.title || "");
            core.setOutput("body", issue.body || "");

      - name: Launch Cursor Cloud Agent
        if: steps.issue.outputs.found == 'true'
        id: cursor
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          TASK_TITLE: ${{ steps.issue.outputs.title }}
          TASK_BODY: ${{ steps.issue.outputs.body }}
        run: |
          set -euo pipefail

          if [ -z "${CURSOR_API_KEY:-}" ]; then
            echo "CURSOR_API_KEY secret is missing" >&2
            exit 1
          fi

          PROMPT="$TASK_TITLE

          $TASK_BODY

          Additional hard rules:
          - Create a new branch.
          - Open a PR if possible.
          - Do not merge to main.
          - Keep the change focused.
          - In the PR body include factual testing instructions and risks/blockers.
          - Read docs/agent-rules.md before implementation if it exists.
          - Create or update docs/agent-worklog.md on your branch with start time, commit notes, finish time, checks run, checks unavailable, blockers, implementation notes, and questions for ChatGPT reviewer.
          - Do not self-review, approve, grade, prioritize, or recommend next workload size. ChatGPT is the only reviewer and task planner."

          jq -n \
            --arg prompt "$PROMPT" \
            --arg repo "${{ github.repository }}" \
            '{
              prompt: {
                text: $prompt,
                images: []
              },
              source: {
                repository: $repo,
                ref: "main"
              },
              target: {
                autoBranch: true,
                autoCreatePr: true,
                openAsCursorGithubApp: false,
                skipReviewerRequest: true
              },
              model: "composer-2"
            }' > cursor-request.json

          curl -sS \
            -u "$CURSOR_API_KEY:" \
            -H "Content-Type: application/json" \
            -X POST \
            https://api.cursor.com/v0/agents \
            -d @cursor-request.json \
            > cursor-response.json

          cat cursor-response.json

          ERROR_MESSAGE=$(jq -r '.error // .message // empty' cursor-response.json)
          if [ -n "$ERROR_MESSAGE" ]; then
            echo "Cursor API returned error: $ERROR_MESSAGE" >&2
            exit 1
          fi

          AGENT_ID=$(jq -r '.id // empty' cursor-response.json)
          if [ -z "$AGENT_ID" ]; then
            echo "Cursor API response did not include agent id" >&2
            exit 1
          fi

          echo "agent_id=$AGENT_ID" >> "$GITHUB_OUTPUT"
          echo "agent_url=$(jq -r '.target.url // empty' cursor-response.json)" >> "$GITHUB_OUTPUT"
          echo "branch=$(jq -r '.target.branchName // empty' cursor-response.json)" >> "$GITHUB_OUTPUT"

      - name: Mark issue as running
        if: steps.issue.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = Number("${{ steps.issue.outputs.number }}");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: [
                "Cursor Cloud Agent launched.",
                "",
                "- Agent ID: `${{ steps.cursor.outputs.agent_id }}`",
                "- Agent URL: ${{ steps.cursor.outputs.agent_url }}",
                "- Branch: `${{ steps.cursor.outputs.branch }}`",
                "",
                "Status: `cursor-running`"
              ].join("\n")
            });

            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number,
                name: "cursor-task"
              });
            } catch (e) {}

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ["cursor-running"]
            });
